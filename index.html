<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gold Rush Adventure</title>
<style>
  body {
    font-family: "Georgia", serif;
    background-color: #f5e8d0;
    color: #333;
    text-align: center;
    padding: 20px;
  }
  #stats {
    font-size: 18px;
    margin-bottom: 10px;
  }
  #scenarioImage {
    max-width: 100%;
    max-height: 400px;
    object-fit: contain;
    border-radius: 8px;
    margin: 10px 0;
  }
  .choice-btn {
    background-color: #d6a95c;
    color: white;
    border: none;
    padding: 10px 20px;
    margin: 5px;
    cursor: pointer;
    border-radius: 5px;
    font-size: 16px;
  }
  .choice-btn:hover {
    background-color: #c28f48;
  }
  #feedbackText {
    font-style: italic;
    margin-top: 10px;
  }
</style>
</head>
<body>

<div id="stats">Health: 10 ❤️ | Gold: 0 🪙 | Progress: 0%</div>
<img id="scenarioImage" src="" alt="Event Image">
<div id="scenarioText"></div>
<br>
<button id="choiceA" class="choice-btn"></button>
<button id="choiceB" class="choice-btn"></button>
<button id="choiceC" class="choice-btn"></button>
<div id="feedbackText"></div>

<script>
let health = 10;
let gold = 0;
let progress = 0;
let currentEvent = 0;

const events = [
  // Intro
  {
    text: `🎬 INTRO: “A Journey Back in Time”
The screen flickers. A low hum fills your ears.
Suddenly, the room around you begins to shift—walls fading, sounds changing—until everything goes dark.
Then…
Dust. Heat. The smell of wood smoke.
You open your eyes and find yourself standing in a small town in the 1840s. People rush past you, shouting, packing wagons, selling everything they own.
You overhear one word again and again: “Gold.”
Someone grabs your arm:
“If you’re going, you better decide fast. California won’t wait.”
You realize what’s happening.
You’ve been sent back in time—to the California Gold Rush.`,
    image: "images/intro.png",
    choices: [
      { text: "Start Journey", health: 0, gold: 0, progress: 1, feedback: "You take a deep breath and step forward, ready to chase your fortune in California." }
    ]
  },
  // Event 1
  {
    text: "You encounter a prospector frantically digging. He looks at you with desperation.",
    image: "images/event1.png",
    choices: [
      { text: "Help him dig", health: -1, gold: 2, progress: 7, feedback: "You dig alongside him. Dust gets in your eyes and you feel a small scrape. Lose 1 health, gain 2 gold." },
      { text: "Move on", health: 0, gold: 0, progress: 7, feedback: "You decide not to get involved. Nothing gained, nothing lost." }
    ]
  },
  // Event 2
  {
    text: "A merchant offers supplies for your journey.",
    image: "images/event2.png",
    choices: [
      { text: "Buy supplies", health: 0, gold: -2, progress: 13, feedback: "You stock up on essentials. Spend 2 gold, better prepared for the adventure ahead." },
      { text: "Decline", health: 0, gold: 0, progress: 13, feedback: "You keep your gold but risk running short later." }
    ]
  },
  // Event 3
  {
    text: "You find a small stream shimmering in the sunlight.",
    image: "images/event3.png",
    choices: [
      { text: "Pan for gold", health: -1, gold: 3, progress: 20, feedback: "You try your luck in the stream. Wet and scratched, you lose 1 health but gain 3 gold." },
      { text: "Drink water and rest", health: 1, gold: 0, progress: 20, feedback: "You refill your canteen and rest briefly. Gain 1 health." }
    ]
  },
  // Event 4
  {
    text: "A group of bandits appears ahead on the trail.",
    image: "images/event4.png",
    choices: [
      { text: "Fight them", health: -2, gold: 5, progress: 27, feedback: "You confront the bandits. Injured but victorious! Lose 2 health, gain 5 gold." },
      { text: "Run away", health: 0, gold: 0, progress: 27, feedback: "You escape safely but lose an opportunity for gold." }
    ]
  },
  // Event 5
  {
    text: "You come across an abandoned cabin.",
    image: "images/event5.png",
    choices: [
      { text: "Search inside", health: -1, gold: 2, progress: 33, feedback: "A loose floorboard scratches you, but you find some gold. Lose 1 health, gain 2 gold." },
      { text: "Ignore it", health: 0, gold: 0, progress: 33, feedback: "You pass by without incident." }
    ]
  },
  // Event 6
  {
    text: "Suddenly, a storm rolls in over the hills.",
    image: "images/event6.png",
    choices: [
      { text: "Find shelter", health: 1, gold: 0, progress: 40, feedback: "You stay dry and safe. Gain 1 health." },
      { text: "Push through the rain", health: -2, gold: 1, progress: 40, feedback: "You get soaked and catch a chill. Lose 2 health, gain 1 gold." }
    ]
  },
  // Event 7
  {
    text: "A rival prospector challenges you to a gold-panning contest.",
    image: "images/event7.png",
    choices: [
      { text: "Compete", health: -1, gold: 4, progress: 47, feedback: "Intense work! You gain some gold but hurt yourself. Lose 1 health, gain 4 gold." },
      { text: "Decline", health: 0, gold: 0, progress: 47, feedback: "You avoid the contest and stay safe." }
    ]
  },
  // Event 8
  {
    text: "You find a mysterious map fluttering on the ground.",
    image: "images/event8.png",
    choices: [
      { text: "Follow the map", health: 0, gold: 3, progress: 53, feedback: "The map leads you to hidden nuggets! Gain 3 gold." },
      { text: "Ignore it", health: 0, gold: 0, progress: 53, feedback: "You walk past, nothing happens." }
    ]
  },
  // Event 9
  {
    text: "A wild animal blocks your path.",
    image: "images/event9.png",
    choices: [
      { text: "Try to scare it", health: -1, gold: 0, progress: 60, feedback: "It scratches you but runs off. Lose 1 health." },
      { text: "Go around", health: 0, gold: 0, progress: 60, feedback: "You carefully detour around the animal." }
    ]
  },
  // Event 10
  {
    text: "You reach a small mining town.",
    image: "images/event10.png",
    choices: [
      { text: "Trade with locals", health: 0, gold: -1, progress: 67, feedback: "You spend some gold for better supplies. Lose 1 gold." },
      { text: "Keep moving", health: 0, gold: 0, progress: 67, feedback: "You march onward, saving your gold." }
    ]
  },
  // Event 11
  {
    text: "You hear about a hidden vein of gold in the hills.",
    image: "images/event11.png",
    choices: [
      { text: "Investigate", health: -1, gold: 5, progress: 73, feedback: "You climb the hill and find gold. Lose 1 health, gain 5 gold." },
      { text: "Ignore the rumor", health: 0, gold: 0, progress: 73, feedback: "Better safe than sorry." }
    ]
  },
  // Event 12
  {
    text: "A prospector offers to share secrets if you share some gold.",
    image: "images/event12.png",
    choices: [
      { text: "Share gold", health: 0, gold: -2, progress: 80, feedback: "You spend 2 gold but gain valuable info for later." },
      { text: "Refuse", health: 0, gold: 0, progress: 80, feedback: "You keep your gold but miss out on advice." }
    ]
  },
  // Event 13
  {
    text: "You come across a dangerous cliffside path.",
    image: "images/event13.png",
    choices: [
      { text: "Carefully traverse", health: -1, gold: 0, progress: 87, feedback: "You make it safely but scrape your arm. Lose 1 health." },
      { text: "Find another route", health: 0, gold: 0, progress: 87, feedback: "It takes longer but you stay safe." }
    ]
  },
  // Event 14
  {
    text: "A miner offers to sell you a secret claim.",
    image: "images/event14.png",
    choices: [
      { text: "Buy claim", health: 0, gold: -3, progress: 93, feedback: "You spend 3 gold on a hidden spot." },
      { text: "Decline", health: 0, gold: 0, progress: 93, feedback: "You pass on the offer." }
    ]
  },
  // Event 15
  {
    text: "You reach the end of your Gold Rush journey.",
    image: "images/event15.png",
    choices: [
      { text: "See final results", health: 0, gold: 0, progress: 100, feedback: "Congratulations! You survived the Gold Rush adventure." }
    ]
  }
];

function updateStats() {
  document.getElementById("stats").innerText = `Health: ${health} ❤️ | Gold: ${gold} 🪙 | Progress: ${progress}%`;
}

function showEvent() {
  const event = events[currentEvent];
  document.getElementById("scenarioText").innerText = event.text;
  document.getElementById("scenarioImage").src = event.image;

  // Buttons logic
  ["A","B","C"].forEach((letter, index) => {
    const btn = document.getElementById("choice" + letter);
    if (event.choices[index]) {
      btn.innerText = event.choices[index].text;
      btn.style.display = "inline-block";
    } else {
      btn.style.display = "none";
    }
  });

  document.getElementById("feedbackText").innerText = "";
  updateStats();
}

function makeChoice(choiceIndex) {
  const choice = events[currentEvent].choices[choiceIndex];
  health += choice.health;
  gold += choice.gold;
  progress = choice.progress;
  document.getElementById("feedbackText").innerText = choice.feedback;

  currentEvent++;
  setTimeout(() => {
    if (currentEvent < events.length) {
      showEvent();
    } else {
      document.getElementById("scenarioText").innerText = "🏆 Adventure Complete!";
      document.getElementById("scenarioImage").style.display = "none";
      document.getElementById("choiceA").style.display = "none";
      document.getElementById("choiceB").style.display = "none";
      document.getElementById("choiceC").style.display = "none";
    }
    updateStats();
  }, 1500);
}

// Attach button events
document.getElementById("choiceA").onclick = () => makeChoice(0);
document.getElementById("choiceB").onclick = () => makeChoice(1);
document.getElementById("choiceC").onclick = () => makeChoice(2);

// Initial load
showEvent();
</script>

</body>
</html>
